<!DOCTYPE html>
<html>
<head>
    <title>Customer Support Chatbot</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f2f2f2;
            text-align: center;
        }

        .chat-container {
            width: 400px;
            margin: 50px auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
            padding: 15px;
        }

        .chat-box {
            height: 300px;
            overflow-y: auto;
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }

        .user {
            color: blue;
            margin: 5px 0;
        }

        .bot {
            color: green;
            margin: 5px 0;
        }

        input {
            width: 70%;
            padding: 8px;
        }

        button {
            padding: 8px 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <h2>Customer Support Chatbot</h2>
    <div class="chat-box" id="chatBox">
        <div class="bot">Bot: Hello! How can I help you today?</div>
    </div>

    <input type="text" id="userInput" placeholder="Type your message...">
    <button onclick="sendMessage()">Send</button>
</div>

<script>
function sendMessage() {
    let input = document.getElementById("userInput").value;
    let chatBox = document.getElementById("chatBox");

    if (input.trim() === "") {
        alert("Please enter a message!");
        return;
    }

    chatBox.innerHTML += "<div class='user'>You: " + input + "</div>";

    let response = getBotResponse(input.toLowerCase());

    chatBox.innerHTML += "<div class='bot'>Bot: " + response + "</div>";

    document.getElementById("userInput").value = "";
    chatBox.scrollTop = chatBox.scrollHeight;
}

function getBotResponse(input) {

    if (input.includes("hello") || input.includes("hi")) {
        return "Hello! Welcome to our store 😊";
    }
    else if (input.includes("hours")) {
        return "Our business hours are 9 AM to 6 PM, Monday to Saturday.";
    }
    else if (input.includes("contact")) {
        return "You can contact us at support@email.com or call 9876543210.";
    }
    else if (input.includes("order")) {
        return "Please provide your Order ID to check the status.";
    }
    else if (input.includes("price")) {
        return "Please mention the product name to know the price.";
    }
    else {
        return "Sorry, I didn't understand that. Please contact customer support.";
    }
}
</script>

</body>
</html>
