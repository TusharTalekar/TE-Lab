<!DOCTYPE html>
<html lang="en">
<script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.6.9/angular.min.js"></script>

<body>
    <!-- HTML View => The HTML container where the AngularJS application is displayed, is called the view. -->
    <div ng-app="" ng-init="name='JJ'">
        <h1>Hello {{name}}</h1>
        <p ng-bind="name"></p>
    </div>

    <!-- Two way data binding => syncronization between model and view  -->
    
</body>

</html>
